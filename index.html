<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <main>
        <div class="container">
            <div class="left-top">
                <div class="logo">
                    <img src="/assets/logo.png" alt="">
                </div>
                <div class="stats">
                    <div class="buttons">
                        <div class="icon">
                            <i class="fa-solid fa-fire-flame-curved"></i>
                        </div>
                        <div class="text">
                            <h2>35</h2>
                            <span>Min</span>
                        </div>
                    </div>
                    <div class="buttons">
                        <div class="icon">
                            <i class="fa-solid fa-heart-pulse"></i>
                        </div>
                        <div class="text">
                            <h2>No</h2>
                            <span>Excuses</span>
                        </div>
                    </div>
                    <div class="buttons">
                        <div class="icon">
                            <i class="fa-solid fa-person-walking"></i>
                        </div>
                        <div class="text">
                            <h2>7</h2>
                            <span>Days</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="left-center-top">
                <div class="img">
                    <img src="/assets/img2.png" alt="">
                </div>
                <div class="text">
                    <p>Use our app for compiling a quality workout!</p>
                </div>
                <div class="apps">
                    <img src="/assets/apps.png" alt="">
                </div>
            </div>
            <div class="right-center-top" style="background-color: rgb(173, 226, 26);"></div>
            <div class="right-top" style="background-color: rgb(76, 31, 182);"></div>
            <div class="center-left" style="background-color: rgb(226, 19, 37);"></div>
            <div class="center" style="background-color: rgb(221, 112, 22);"></div>
            <div class="bottom-left" style="background-color: khaki;"></div>
            <div class="bottom-center" style="background-color: rgb(154, 10, 190);"></div>
            <div class="bottom-right" style="background-color: brown;"></div>
        </div>
    </main>
</body>

</html>
